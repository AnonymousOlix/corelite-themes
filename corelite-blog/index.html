<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>CoreLite Blog</title>
	<meta name="description" content="CoreLite Blog is a clean one-column WordPress blog theme for simple publishing.">
	<style>
		:root {
			color-scheme: light;
			--bg: #fcfaf7;
			--surface: #fffdfb;
			--text: #2f2924;
			--muted: #6d6258;
			--accent: #7b4d2a;
			--border: #d9d2cb;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
			color: var(--text);
			font: 17px/1.8 Georgia, serif;
		}

		.wrapper {
			width: min(100% - 32px, 900px);
			margin: 0 auto;
			padding: 48px 0 64px;
		}

		.card {
			padding: 32px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 18px;
		}

		.label {
			margin: 0 0 12px;
			color: var(--accent);
			font-size: 14px;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			font-family: Arial, sans-serif;
		}

		h1 {
			margin: 0 0 12px;
			font-size: clamp(2.2rem, 4vw, 3.8rem);
			line-height: 1.08;
		}

		p {
			margin: 0 0 16px;
		}

		.meta {
			color: var(--muted);
			font-family: Arial, sans-serif;
		}

		.links {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			margin: 24px 0 32px;
			font-family: Arial, sans-serif;
		}

		.links a {
			display: inline-block;
			padding: 12px 18px;
			border-radius: 999px;
			text-decoration: none;
		}

		.links a:first-child {
			background: var(--accent);
			color: #ffffff;
		}

		.links a:last-child {
			border: 1px solid var(--border);
			color: var(--text);
		}

		img {
			display: block;
			width: 100%;
			height: auto;
			border: 1px solid var(--border);
			border-radius: 14px;
		}
	</style>
</head>
<body>
	<div class="wrapper">
		<div class="card">
			<p class="label">CoreLite Themes</p>
			<h1>CoreLite Blog</h1>
			<p>A clean one-column blog theme designed for readable posts and simple personal publishing.</p>
			<p class="meta">Classic WordPress theme. Version 1.0.0.</p>
			<div class="links">
				<a href="https://github.com/anonymousolix/corelite-themes/tree/main/corelite-blog">View Source</a>
				<a href="https://anonymousolix.github.io/corelite-themes/">All Themes</a>
			</div>
			<img src="screenshot.png" alt="CoreLite Blog theme preview">
		</div>
	</div>
</body>
</html>
